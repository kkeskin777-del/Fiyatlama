<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İş Araçları</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#0f0c1a;color:#f0ecff;min-height:100vh;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 600px 400px at 10% 20%,rgba(199,125,255,.08) 0%,transparent 70%),radial-gradient(ellipse 500px 400px at 90% 80%,rgba(77,150,255,.08) 0%,transparent 70%);pointer-events:none;z-index:0;}
#home-screen{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:32px;}
.home-logo{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;background:linear-gradient(135deg,#ff6b6b,#c77dff,#4d96ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;}
.home-logo small{font-size:12px;font-weight:400;display:block;-webkit-text-fill-color:#8b82a8;color:#8b82a8;letter-spacing:2px;text-transform:uppercase;margin-top:6px;}
.app-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;width:100%;max-width:520px;}
.app-card{background:#1a1530;border:1px solid #2e2650;border-radius:24px;padding:32px 16px;display:flex;flex-direction:column;align-items:center;gap:14px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;}
.app-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.app-card.fiyat::before{background:linear-gradient(135deg,#ff6b6b,#c77dff,#4d96ff);}
.app-card.gelir::before{background:linear-gradient(135deg,#3dd68c,#4d96ff);}
.app-card:active{transform:translateY(-3px);border-color:#c77dff;box-shadow:0 12px 40px rgba(199,125,255,.2);}
.app-icon{font-size:52px;line-height:1;}
.app-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;text-align:center;line-height:1.4;}
.app-desc{font-size:11px;color:#8b82a8;text-align:center;line-height:1.5;}
.back-btn{position:fixed;top:12px;left:12px;z-index:9999;width:36px;height:36px;border-radius:10px;background:rgba(26,21,48,.95);border:1px solid #2e2650;color:#f0ecff;font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center;backdrop-filter:blur(10px);}
#app-frame{position:fixed;inset:0;width:100%;height:100%;border:none;display:none;background:#fff;}
</style>
</head>
<body>

<button class="back-btn" id="backBtn" onclick="goHome()">←</button>

<div id="home-screen">
  <div class="home-logo">İş Araçları<small>Profesyonel Takip Sistemi</small></div>
  <div class="app-grid">
    <div class="app-card fiyat" onclick="openApp('fiyat')">

      <div class="app-desc">Ürün maliyet & fiyatlandırma</div>
    </div>
    <div class="app-card gelir" onclick="openApp('gelir')">

      <div class="app-name">Gelir Gider Tablosu</div>
      <div class="app-desc">Mali tablo & kazanç takibi</div>
    </div>
  </div>
</div>

<iframe id="app-frame"></iframe>

function openApp(app) {
  const frame = document.getElementById('app-frame');
  frame.src = APPS[app];
  frame.style.display = 'block';
  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('backBtn').style.display = 'flex';
}

function goHome() {
  const frame = document.getElementById('app-frame');
  frame.src = '';
  frame.style.display = 'none';
  document.getElementById('home-screen').style.display = 'flex';
  document.getElementById('backBtn').style.display = 'none';
}
